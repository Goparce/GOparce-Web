<!DOCTYPE html>
<html>
<head>
  <title>GO PARCE - Login</title>
</head>
<body>

<h1>GO PARCE</h1>

<h2>Login</h2>

<input id="correo" placeholder="Correo"><br><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>

<button onclick="login()">Ingresar</button>

<p id="error" style="color:red;"></p>

<p>
  <button onclick="irRecuperar()">¿Olvidaste tu contraseña?</button>
</p>

<hr>

<p>¿No tienes cuenta?</p>
<button onclick="irRegistro()">Registrarse</button>

<script>

const API = "http://localhost:3000";

function irRegistro() {
  window.location.href = "registro.html";
}

function irRecuperar() {
  window.location.href = "recuperar.html";
}

async function login() {

  const correo = document.getElementById("correo").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ correo, password })
  });

  const data = await res.json();

  if (!res.ok) {
    document.getElementById("error").innerText = "Credenciales incorrectas";
    return;
  }

  // 🔥 GUARDAR USUARIO
  localStorage.setItem("usuario", JSON.stringify(data));

  // 🔥 REDIRECCIÓN INTELIGENTE
  if (data.tipo === "negocio" || data.tipo === "organizacion") {
    window.location.href = "panel.html";
  } else {
    window.location.href = "app.html";
  }
}

</script>

</body>
</html>
